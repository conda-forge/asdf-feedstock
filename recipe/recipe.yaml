schema_version: 1

context:
  name: asdf
  version: 5.1.0
  python_min: "3.9"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 20bcacd47259dc894044dcf37b82b4ced14bd172ce302b3592972ee8174512d4

build:
  noarch: python
  number: 1
  script: python -m pip install . --no-deps -vv

tests:
  - python:
      imports:
        - asdf
        - asdf.tags
        - asdf.tags.core
      python_version: ${{ python_min }}.*
      pip_check: true
  - script:
      - asdftool --help

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
    - setuptools_scm
  run:
    - python >=${{ python_min }}
    - asdf-standard >=1.1.0
    - asdf-transform-schemas >=0.3.0
    - importlib-metadata >=4.11.4
    - jmespath >=0.6.2
    - numpy >=1.22
    - packaging >=19.0
    - pyyaml >=5.4.1
    - semantic_version >=2.8
    - attrs >=22.2.0

about:
  homepage: http://github.com/asdf-format/asdf
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Python implementation of the ASDF Standard
  documentation: http://asdf.readthedocs.io/
  repository: http://github.com/asdf-format/asdf
  description: |
    Python library for reading and writing ASDF files. The Advanced Scientific
    Data Format (ASDF) is a next generation interchange format for scientific
    data.

extra:
  recipe_maintainers:
    - mwcraig
    - eslavich
    - jhunkeler
    - braingram
    - nden
